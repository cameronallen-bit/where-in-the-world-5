<style>
:root{--primary:#3c4b55;--accent:#cf5736;--bg:#f0f4f7;--card:#fff;--text:#3c4b55;--muted:#7a8a95;--border:rgba(60,75,85,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Nunito Sans','Proxima Nova',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:400;display:flex;flex-direction:column;align-items:center;padding:20px 16px;text-align:center}
h1,h2,h3,h4{font-weight:800}
.card{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:640px;text-align:center;border:1px solid var(--border);box-shadow:0 2px 12px rgba(60,75,85,.06)}
.btn{padding:14px 28px;border-radius:10px;border:none;color:#fff;font-size:14px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;width:100%;max-width:300px;display:inline-block;-webkit-tap-highlight-color:transparent}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.12)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.45;cursor:default;transform:none!important;box-shadow:none!important}
.btn-accent{background:var(--accent)}.btn-primary{background:var(--primary)}.btn-reveal{background:#6c5ce7}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--primary);font-size:13px;padding:10px 20px;letter-spacing:1px}
input{padding:14px 18px;border-radius:10px;border:2px solid var(--border);background:#fff;color:var(--text);font-size:16px;font-family:inherit;width:100%;max-width:300px;outline:none}
input:focus{border-color:var(--accent)}input::placeholder{color:#aab5be}
.img-box{width:100%;max-width:700px;border-radius:14px;overflow:hidden;margin:12px auto;background:#e8ecf0;position:relative}
.img-box img{width:100%;height:auto;max-height:50vh;object-fit:contain;display:block;margin:0 auto}
.img-fallback{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.3}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:640px;margin:14px auto 0}
.opt-display{padding:16px 12px;border-radius:10px;font-size:15px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff}
.opt-btn{padding:18px 10px;border-radius:10px;font-size:15px;font-weight:700;color:#fff;border:none;cursor:pointer;text-align:center;transition:transform .1s,box-shadow .15s;-webkit-tap-highlight-color:transparent;position:relative}
.opt-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}.opt-btn:active{transform:translateY(0)}
.opt-btn.selected{box-shadow:0 0 0 4px #fff,0 0 0 7px var(--primary);transform:scale(1.03)}
.timer-bar{width:100%;max-width:640px;margin:10px auto}
.timer-track{height:6px;border-radius:3px;background:var(--border)}
.timer-fill{height:100%;border-radius:3px;transition:width .3s,background .3s}
.lb-row{display:flex;align-items:center;padding:12px 16px;margin:5px 0;border-radius:10px;transition:all .3s;background:#fff;border:2px solid transparent}
.lb-row.hl{background:rgba(207,87,54,.06)!important;border-color:var(--accent)!important}
.chip{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700;display:inline-block;background:var(--bg);color:var(--primary);border:1px solid var(--border)}
.chip.me{background:rgba(207,87,54,.08);border-color:var(--accent);color:var(--accent)}
.code-display{font-size:56px;font-weight:800;letter-spacing:12px;color:var(--accent);font-family:'Nunito Sans','Proxima Nova',monospace}
.correct-opt{background:#27ae60!important;opacity:1!important;border:2px solid #27ae60!important}
.wrong-opt{background:#cdd5db!important;opacity:.6!important;border:2px solid transparent!important;color:#7a8a95!important}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.fact-box{background:linear-gradient(135deg,rgba(207,87,54,.06),rgba(207,87,54,.02));border:1px solid rgba(207,87,54,.2);border-radius:12px;padding:18px 20px;margin:16px auto 0;max-width:600px;text-align:left}
.fact-box .fact-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px}
.fact-box .fact-text{font-size:15px;line-height:1.6;color:var(--text)}
.hint-box{background:linear-gradient(135deg,rgba(108,92,231,.07),rgba(108,92,231,.02));border:1px solid rgba(108,92,231,.25);border-radius:12px;padding:16px 20px;margin:12px auto 0;max-width:640px;text-align:left;animation:hintIn .4s ease-out}
.hint-box .hint-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#6c5ce7;margin-bottom:5px}
.hint-box .hint-text{font-size:14px;line-height:1.6;color:var(--text);font-style:italic}
@keyframes hintIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.who-answered{margin:10px auto 0;max-width:640px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.who-chip{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700;background:rgba(39,174,96,.1);color:#27ae60;border:1px solid rgba(39,174,96,.25);animation:hintIn .3s ease-out}
@media(max-width:480px){.code-display{font-size:40px;letter-spacing:8px}.opt-btn,.opt-display{font-size:13px;padding:14px 8px}}
</style>

var QUESTIONS=[
  {img:"https://drive.google.com/thumbnail?id=1Z4yXkQWVNwwAAwxtwARqzFCYRtNZ9iE5&sz=w1200",answer:"Mexico City, Mexico",opts:["Lima, Peru","Mexico City, Mexico","Bogota, Colombia","Madrid, Spain"],ci:1,hint:"This destination stands on the site of Tenochtitlan, once the capital of a major pre-Columbian empire.",fact:"You can float through Xochimilco on brightly painted boats while mariachi bands drift by on other boats like it's the most extra traffic jam on Earth."},
  {img:"https://images.pexels.com/photos/36338948/pexels-photo-36338948.jpeg?auto=compress&cs=tinysrgb&w=900",answer:"Marrakesh, Morocco",opts:["Seville, Spain","Jaipur, India","Marrakesh, Morocco","Lisbon, Portugal"],ci:2,hint:"This city is one of the great historic gateways between the Sahara and the Mediterranean world.",fact:"At night, Jemaa el-Fnaa feels less like a square and more like a giant live-action stage full of smoke, snacks, music, and chaos."},
  {img:"https://images.unsplash.com/photo-1600791608938-6d50caed69d1?q=80&w=1911&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Savannah, Georgia",opts:["Savannah, Georgia","Charleston, South Carolina","New Orleans, Louisiana","Asheville, North Carolina"],ci:0,hint:"This was one of the first planned cities in the American colonies, built around a grid of public squares.",fact:"Savannah leans so hard into its spooky reputation that ghost tours are basically part of the local nightlife."},
  {img:"https://images.unsplash.com/photo-1627414878948-9c76dc53b342?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Assateague Island, Maryland/Virginia",opts:["Great Smoky Mountains, Tennessee/North Carolina","Yellowstone, Wyoming/Montana","Death Valley, California/Nevada","Assateague Island, Maryland/Virginia"],ci:3,hint:"This barrier island is split between two U.S. states and is famous for free-roaming horses.",fact:"The wild horses are adorable right up until they start acting like furry beach bandits around people's food."},
  {img:"https://drive.google.com/thumbnail?id=1rwHYERlIhOXK1npvDvEScGPaJkmUXjYv&sz=w1200",answer:"Dubrovnik, Croatia",opts:["Patok, Albania","Dubrovnik, Croatia","Valletta, Malta","Naples, Italy"],ci:1,hint:"For centuries, this city was an independent maritime republic competing with Venice for influence on the Adriatic.",fact:"Dubrovnik's walls were so perfect for HBO's Game of Thrones that the city became known as King's Landing before a lot of people knew its real name."},
  {img:"https://images.pexels.com/photos/2929906/pexels-photo-2929906.jpeg?auto=compress&cs=tinysrgb&w=900",answer:"Machu Picchu, Peru",opts:["Machu Picchu, Peru","Chichen Itza, Mexico","Angkor Wat, Cambodia","Cusco, Peru"],ci:0,hint:"This site was largely unknown to the outside world until the early 1900s, when it was brought to global attention by an American explorer.",fact:"The stones at Machu Picchu were fitted so precisely that many were built without mortar, which is a pretty outrageous flex for the 1400s."},
  {img:"https://images.unsplash.com/photo-1530538095376-a4936b35b5f0?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Cliffs of Moher, Ireland",opts:["Big Sur, California","Isle of Skye, Scotland","Cliffs of Moher, Ireland","Giant's Causeway, Northern Ireland"],ci:2,hint:"This natural wonder sits along the Wild Atlantic Way, a long coastal route on the western edge of Europe.",fact:"Between the crashing Atlantic, the seabirds, and the wind, the Cliffs of Moher can feel like Ireland turned the drama setting all the way up."},
  {img:"https://images.unsplash.com/photo-1604629142514-b3f81fa7b75a?q=80&w=1365&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Ho Chi Minh City, Vietnam",opts:["Bangkok, Thailand","Ho Chi Minh City, Vietnam","Singapore","Hong Kong"],ci:1,hint:"Many people still call this city by its former name, especially when talking about its historic center.",fact:"Crossing the street here can feel like a trust exercise with a thousand scooters."},
  {img:"https://images.unsplash.com/photo-1624253321171-1be53e12f5f4?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Kyoto, Japan",opts:["Tokyo, Japan","Seoul, South Korea","Taipei, Taiwan","Kyoto, Japan"],ci:3,hint:"This city served as the country's imperial capital for more than a thousand years before that role moved elsewhere.",fact:"Kyoto protects its old-school beauty so seriously that even some convenience store signs are toned down to match the vibe."},
  {img:"https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Sydney, Australia",opts:["Sydney, Australia","Auckland, New Zealand","Vancouver, Canada","Melbourne, Australia"],ci:0,hint:"This city hosted the Summer Olympics in 2000.",fact:"The Opera House is now world-famous, but during construction it was so over budget and controversial that it became a national saga."},
  {img:"https://images.unsplash.com/photo-1735629805149-3feda1afee50?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Marseille, France",opts:["Barcelona, Spain","Tivat, Montenegro","Marseille, France","Naples, Italy"],ci:2,hint:"Founded by Greek settlers, this is often considered the oldest major city in its country.",fact:"Bouillabaisse started as a fisherman's \"use whatever's left\" soup here, then somehow got fancy enough to end up on white tablecloths."},
  {img:"https://images.unsplash.com/photo-1501179691627-eeaa65ea017c?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Bali, Indonesia",opts:["Phuket, Thailand","Bali, Indonesia","Hawaii, USA","Fiji"],ci:1,hint:"Unlike most of its surrounding nation, this island is known for a predominantly Hindu culture.",fact:"In Bali, tiny flower offerings show up on sidewalks and doorsteps every morning, so the ground is basically decorated before breakfast."},
  {img:"https://images.unsplash.com/photo-1733886870851-82f45e3fad3c?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Cape Town, South Africa",opts:["Rio de Janeiro, Brazil","Auckland, New Zealand","Valparaiso, Chile","Cape Town, South Africa"],ci:3,hint:"This city grew as an important resupply stop for ships traveling between Europe and Asia.",fact:"Cape Town is one of those places where penguins, vineyards, beaches, and a giant mountain can all realistically be part of the same day."},
  {img:"https://images.unsplash.com/photo-1619546952812-520e98064a52?q=80&w=2071&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Rio de Janeiro, Brazil",opts:["Rio de Janeiro, Brazil","Barcelona, Spain","Honolulu, Hawaii","Cape Town, South Africa"],ci:0,hint:"This city was once the capital of its country and later hosted both the Olympics and the World Cup.",fact:"On New Year's Eve, huge crowds in Rio wear white to the beach for luck, which turns the shoreline into one massive party with a dress code."},
  {img:"https://images.unsplash.com/photo-1653078127179-6d9f29cb057c?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Venice, Italy",opts:["Amsterdam, Netherlands","Bruges, Belgium","Venice, Italy","Prague, Czech Republic"],ci:2,hint:"This city was once the capital of a powerful trading republic that dominated Mediterranean commerce for centuries.",fact:"In Venice, even ambulances and hearses can arrive by boat, which really drives home the whole \"no cars\" commitment."},
  {img:"https://images.unsplash.com/photo-1716648720773-82cfa50f167f?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"San Juan, Puerto Rico",opts:["Cartagena, Colombia","San Juan, Puerto Rico","Havana, Cuba","Lisbon, Portugal"],ci:1,hint:"Think of a place with a vibrant old town, historic forts, and a strong Spanish cultural influence.",fact:"Old San Juan's famous blue cobblestones started out as ship ballast, which is a pretty stylish afterlife for old cargo."},
  {img:"https://images.unsplash.com/photo-1564511287568-54483b52a35e?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Prague, Czech Republic",opts:["Vienna, Austria","Brussels, Belgium","Prague, Czech Republic","Copenhagen, Denmark"],ci:2,hint:"This capital is known for its old-world skyline of towers and bridges in Central Europe.",fact:"Prague's Astronomical Clock doesn't just tell time \u2014 it basically shows off by tracking the sun, moon, and zodiac like a medieval smartwatch."},
  {img:"https://images.unsplash.com/photo-1661442196029-ecc4a8e0a0b8?q=80&w=2074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Seville, Spain",opts:["Seville, Spain","Lisbon, Portugal","Rome, Italy","Buenos Aires, Argentina"],ci:0,hint:"This destination is in the south of its country and is celebrated for its sunshine, historic arches, and vibrant regional identity.",fact:"Seville's cathedral is so enormous that Christopher Columbus is buried there \u2014 or at least part of him is, depending on who you ask."},
  {img:"https://images.unsplash.com/photo-1529270122027-2f6929c45b7c?q=80&w=1288&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Istanbul, Turkey",opts:["Athens, Greece","Istanbul, Turkey","Rome, Italy","Casablanca, Morocco"],ci:1,hint:"This city has served as the capital of the Roman, Byzantine, and Ottoman Empires.",fact:"Istanbul's cats roam shops, sidewalks, and cafes with the confidence of creatures who are fully aware the city belongs to them."},
  {img:"https://images.unsplash.com/photo-1578494277722-4ebd3d3ab9b7?q=80&w=2060&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",answer:"Montreal, Canada",opts:["Toronto, Canada","Boston, USA","Montreal, Canada","Chicago, USA"],ci:2,hint:"This is one of the largest French-speaking cities in the world, despite not being in France.",fact:"Montrealers argue about bagels with the energy other cities reserve for sports championships."}
];

var Q_TIME=20,MAX_PTS=1000,MIN_PTS=600,HINT_AT=15;
var ABCD=["A","B","C","D"];
var CC=["#cf5736","#3c4b55","#d4883e","#457b6b"];
var MEDALS=["\u{1F947}","\u{1F948}","\u{1F949}"];
function $(id){return document.getElementById(id)}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function genId(){return Math.random().toString(36).slice(2,8)}
function genCode(){return String(Math.floor(1000+Math.random()*9000))}
var pid=genId(),role=null,gameCode=null,pname="";
var timerIv=null,currentScreen=null,lastStatusKey="";
var playerAnsweredQ=-1,playerChoiceIdx=null;
var hintShown=false;
var listeners=[];
function detachAll(){for(var i=0;i<listeners.length;i++){listeners[i][0].off(listeners[i][1],listeners[i][2])}listeners=[];clearInterval(timerIv);timerIv=null}
function listenGame(handler){var ref=db.ref("games/"+gameCode);var fn=function(snap){handler(snap.val())};ref.on("value",fn);listeners.push([ref,"value",fn])}
function sortPlayers(p){var arr=[];var keys=Object.keys(p||{});for(var i=0;i<keys.length;i++){var v=p[keys[i]];arr.push({id:keys[i],name:v.name,score:v.score||0,lastCorrect:v.lastCorrect,lastPts:v.lastPts||0})}arr.sort(function(a,b){return b.score-a.score});return arr}
function renderLB(players,highlight){var sorted=sortPlayers(players);if(!sorted.length)return '<p style="color:var(--muted);font-size:14px">No players yet</p>';var h='<div style="width:100%;max-width:540px;margin:0 auto">';for(var i=0;i<sorted.length;i++){var p=sorted[i];var isHl=highlight===p.id;h+='<div class="lb-row'+(isHl?" hl":"")+'">';h+='<span style="font-size:20px;width:36px;text-align:center">'+(i<3?MEDALS[i]:(i+1)+".")+'</span>';h+='<span style="flex:1;font-weight:700;font-size:15px;margin-left:8px;text-align:left">'+esc(p.name)+'</span>';h+='<span style="font-weight:800;font-size:17px;color:var(--accent)">'+p.score.toLocaleString()+'</span>';h+='</div>'}return h+'</div>'}
function startTimer(end,qi){clearInterval(timerIv);hintShown=false;function tick(){var left=Math.max(0,Math.ceil((end-Date.now())/1000));var pct=Math.min(100,(left/Q_TIME)*100);var color=left>10?"#27ae60":left>5?"#d4883e":"#cf5736";var num=$("timer-num"),fill=$("timer-fill");if(num){num.textContent=left+"s";num.style.color=color}if(fill){fill.style.width=pct+"%";fill.style.background=color}if(!hintShown&&left<=HINT_AT){hintShown=true;var hEl=$("hint-slot");if(hEl){var q=QUESTIONS[qi];hEl.innerHTML='<div class="hint-box"><div class="hint-label">\u{1F4AC} Helpful Hint</div><div class="hint-text">'+esc(q.hint)+'</div></div>'}}}tick();timerIv=setInterval(tick,200)}
function factHtml(q){return '<div class="fact-box"><div class="fact-label">\u{1F4A1} Fun Fact</div><div class="fact-text">'+esc(q.fact)+'</div></div>'}
function imgTag(src){return '<div class="img-box"><img src="'+src+'" alt="Mystery destination" onerror="this.outerHTML=\'<div class=img-fallback>\u{1F30D}</div>\'"></div>'}

function renderHome(){detachAll();currentScreen="home";role=null;gameCode=null;playerAnsweredQ=-1;playerChoiceIdx=null;lastStatusKey="";$("app").innerHTML='<img src="https://drive.google.com/thumbnail?id=1Kzs6tjEXsFw-eRolMQ-5VdzHQc3DlYwb&sz=w400" alt="Logo" style="max-width:220px;margin:16px auto 12px;display:block"><div style="font-size:48px;margin:0 auto 8px">\u{1F30D}</div><h1 style="font-size:30px;color:var(--primary);margin-bottom:6px">Where in the World?</h1><p style="color:var(--muted);margin-bottom:36px;font-size:14px;font-weight:700">Marketing Connections March Destination Trivia</p><div class="card" style="display:flex;flex-direction:column;gap:14px;align-items:center"><button class="btn btn-accent" onclick="hostCreate()">HOST A GAME</button><button class="btn btn-primary" onclick="renderJoin()">JOIN A GAME</button></div>'}

function renderJoin(){currentScreen="join";$("app").innerHTML='<p class="section-label" style="margin:20px 0 16px">JOIN GAME</p><div class="card" style="display:flex;flex-direction:column;gap:14px;align-items:center"><input id="inp-name" placeholder="Your name" maxlength="20" autocomplete="off"><input id="inp-code" placeholder="Game code (4 digits)" maxlength="4" inputmode="numeric" autocomplete="off"><p id="join-err" style="color:var(--accent);font-size:14px;display:none"></p><button class="btn btn-primary" id="join-btn" onclick="playerJoin()">JOIN</button><button class="btn btn-ghost" onclick="renderHome()">\u2190 BACK</button></div>';$("inp-code").addEventListener("keydown",function(e){if(e.key==="Enter")playerJoin()});$("inp-name").focus()}
function showJoinErr(msg){var el=$("join-err");if(el){el.textContent=msg;el.style.display="block"}var btn=$("join-btn");if(btn){btn.disabled=false;btn.textContent="JOIN"}}

function hostCreate(){gameCode=genCode();role="host";db.ref("games/"+gameCode).set({status:"lobby",currentQ:0,total:QUESTIONS.length,timerEnd:0,correctIdx:null,hostId:pid}).then(function(){listenGame(handleHostUpdate)})}

function handleHostUpdate(g){if(!g){renderHome();return}var players=g.players||{};var answers=g.answers||{};var key=g.status+":"+g.currentQ;if(g.status==="lobby"){renderHostLobby(g,players)}else if(g.status==="question"){if(lastStatusKey!==key){renderHostQ(g,players,answers)}else{var el=$("answer-count");var pc=Object.keys(players).length;var ac=Object.keys(answers).length;if(el)el.textContent=ac+"/"+pc+" ANSWERED";var ws=$("who-slot");if(ws){var wh="";var akeys=Object.keys(answers);for(var i=0;i<akeys.length;i++){if(players[akeys[i]])wh+='<span class="who-chip">'+esc(players[akeys[i]].name)+"</span>"}ws.innerHTML=wh}}}else if(g.status==="results"){if(lastStatusKey!==key)renderHostResults(g,players)}else if(g.status==="final"){if(lastStatusKey!==key)renderHostFinal(players)}lastStatusKey=key}

function renderHostLobby(g,players){currentScreen="host-lobby";var pArr=Object.values(players);var chips="";if(pArr.length){for(var i=0;i<pArr.length;i++)chips+='<span class="chip">'+esc(pArr[i].name)+"</span> "}else chips='<p style="color:var(--muted);font-size:14px" class="pulse">Waiting for players...</p>';$("app").innerHTML='<p class="section-label" style="margin:16px 0 20px">GAME LOBBY</p><div class="card" style="margin-bottom:20px"><p class="section-label" style="margin-bottom:10px">GAME CODE</p><div class="code-display">'+gameCode+'</div><p style="color:var(--muted);font-size:13px;margin-top:8px">Everyone opens this URL and clicks Join</p></div><div class="card" style="margin-bottom:20px"><p style="font-size:15px;font-weight:700;margin-bottom:12px">'+pArr.length+' Player'+(pArr.length!==1?"s":"")+" Joined</p>"+'<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+chips+'</div></div><button class="btn btn-accent" '+(pArr.length===0?"disabled":"")+' onclick="hostNextQ()">START GAME ('+QUESTIONS.length+' QUESTIONS)</button><br><button class="btn btn-ghost" style="margin-top:12px;max-width:200px" onclick="hostReset()">CANCEL</button>'}

function renderHostQ(g,players,answers){currentScreen="host-q";clearInterval(timerIv);var q=QUESTIONS[g.currentQ];var pc=Object.keys(players).length;var ac=Object.keys(answers).length;var oh="";for(var i=0;i<q.opts.length;i++)oh+='<div class="opt-display" style="background:'+CC[i]+'"><span style="opacity:.7;font-weight:800">'+ABCD[i]+'</span> '+esc(q.opts[i])+'</div>';var wh="";var akeys=Object.keys(answers);for(var j=0;j<akeys.length;j++){if(players[akeys[j]])wh+='<span class="who-chip">'+esc(players[akeys[j]].name)+"</span>"}$("app").innerHTML='<div style="display:flex;justify-content:space-between;width:100%;max-width:640px;margin-bottom:6px"><span class="section-label">QUESTION '+(g.currentQ+1)+' OF '+QUESTIONS.length+'</span><span id="answer-count" class="section-label">'+ac+'/'+pc+' ANSWERED</span></div><div class="timer-bar"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;color:var(--muted)">Time remaining</span><span id="timer-num" style="font-size:16px;font-weight:800">--</span></div><div class="timer-track"><div id="timer-fill" class="timer-fill"></div></div></div>'+imgTag(q.img)+'<div class="opts-grid">'+oh+'</div><div id="who-slot" class="who-answered">'+wh+'</div><div id="hint-slot"></div><div style="margin-top:16px"><button class="btn btn-reveal" style="max-width:220px" onclick="hostReveal()">REVEAL ANSWER</button></div>';startTimer(g.timerEnd,g.currentQ)}

function hostNextQ(){db.ref("games/"+gameCode).once("value").then(function(snap){var g=snap.val();if(!g)return;var qi=g.status==="lobby"?0:g.currentQ+1;if(qi>=QUESTIONS.length){db.ref("games/"+gameCode).update({status:"final",currentQ:qi});return}db.ref("games/"+gameCode+"/answers").remove().then(function(){db.ref("games/"+gameCode).update({status:"question",currentQ:qi,timerEnd:Date.now()+Q_TIME*1000,correctIdx:null})})})}

function hostReveal(){db.ref("games/"+gameCode).once("value").then(function(snap){var g=snap.val();if(!g||g.status!=="question")return;var q=QUESTIONS[g.currentQ];var answers=g.answers||{};var players=g.players||{};var akeys=Object.keys(answers);for(var i=0;i<akeys.length;i++){var apid=akeys[i];var ans=answers[apid];if(!players[apid])continue;if(ans.choice===q.ci){var start=g.timerEnd-Q_TIME*1000;var elapsed=Math.max(0,ans.time-start);var ratio=Math.max(0,1-elapsed/(Q_TIME*1000));var pts=Math.round(MIN_PTS+(MAX_PTS-MIN_PTS)*ratio);players[apid].score=(players[apid].score||0)+pts;players[apid].lastPts=pts;players[apid].lastCorrect=true}else{players[apid].lastPts=0;players[apid].lastCorrect=false}}var pkeys=Object.keys(players);for(var j=0;j<pkeys.length;j++){if(!answers[pkeys[j]]){players[pkeys[j]].lastCorrect=false;players[pkeys[j]].lastPts=0}}db.ref("games/"+gameCode+"/players").set(players).then(function(){db.ref("games/"+gameCode).update({status:"results",correctIdx:q.ci})})})}

function renderHostResults(g,players){currentScreen="host-results";clearInterval(timerIv);var q=QUESTIONS[g.currentQ];var oh="";for(var i=0;i<q.opts.length;i++){var cls=i===g.correctIdx?"correct-opt":"wrong-opt";oh+='<div class="opt-display '+cls+'">'+(i===g.correctIdx?"\u2705 ":"")+esc(q.opts[i])+'</div>'}var isLast=g.currentQ+1>=QUESTIONS.length;$("app").innerHTML='<h2 style="font-size:22px;margin:16px 0 4px">Answer Revealed!</h2><p class="section-label" style="margin-bottom:14px">QUESTION '+(g.currentQ+1)+' OF '+QUESTIONS.length+'</p><div class="opts-grid" style="margin-bottom:4px">'+oh+'</div>'+factHtml(q)+'<h3 style="font-size:16px;margin:20px 0 10px">Leaderboard</h3>'+renderLB(players)+'<div style="margin-top:20px"><button class="btn btn-accent" style="max-width:260px" onclick="hostNextQ()">'+(isLast?'\u{1F3C6} FINAL RESULTS':'NEXT QUESTION \u2192')+'</button></div>'}

function renderHostFinal(players){currentScreen="host-final";clearInterval(timerIv);var sorted=sortPlayers(players);$("app").innerHTML='<div style="font-size:56px;margin:20px 0 8px">\u{1F3C6}</div><h1 style="font-size:26px;color:var(--primary);margin-bottom:4px">'+(sorted[0]?esc(sorted[0].name)+' Wins!':'Game Over!')+'</h1><p class="section-label" style="margin-bottom:24px">FINAL STANDINGS</p>'+renderLB(players)+'<div style="margin-top:24px"><button class="btn btn-accent" style="max-width:200px" onclick="hostReset()">NEW GAME</button></div>'}
function hostReset(){detachAll();if(gameCode){try{db.ref("games/"+gameCode).remove()}catch(e){}}renderHome()}

function playerJoin(){pname=($("inp-name")?$("inp-name").value:"").trim();var code=($("inp-code")?$("inp-code").value:"").trim();if(!pname){showJoinErr("Please enter your name");return}if(code.length!==4){showJoinErr("Enter the 4-digit game code");return}var btn=$("join-btn");if(btn){btn.disabled=true;btn.textContent="JOINING..."}db.ref("games/"+code).once("value").then(function(snap){var g=snap.val();if(!g){showJoinErr("No game found with that code");return}if(g.status!=="lobby"){showJoinErr("That game is already in progress");return}gameCode=code;role="player";db.ref("games/"+gameCode+"/players/"+pid).set({name:pname,score:0,lastCorrect:null,lastPts:0}).then(function(){listenGame(handlePlayerUpdate)})}).catch(function(){showJoinErr("Connection error")})}

function handlePlayerUpdate(g){if(!g){renderHome();return}var players=g.players||{};var me=players[pid];if(!me&&g.status!=="final"){renderHome();return}var key=g.status+":"+g.currentQ;if(g.status==="lobby"){renderPlayerLobby(players)}else if(g.status==="question"){if(lastStatusKey!==key){playerChoiceIdx=null;playerAnsweredQ=-1;renderPlayerQ(g,me)}}else if(g.status==="results"){if(lastStatusKey!==key)renderPlayerResults(g,players,me)}else if(g.status==="final"){if(lastStatusKey!==key)renderPlayerFinal(players,me)}lastStatusKey=key}

function renderPlayerLobby(players){currentScreen="player-lobby";playerAnsweredQ=-1;playerChoiceIdx=null;var pArr=Object.keys(players);var chips="";for(var i=0;i<pArr.length;i++){var id=pArr[i];var p=players[id];chips+='<span class="chip'+(id===pid?" me":"")+'">'+esc(p.name)+'</span> '}$("app").innerHTML='<div style="font-size:40px;margin:24px 0 8px">\u231B</div><h2 style="font-size:22px;margin-bottom:8px">You\u2019re In!</h2><div class="card"><p style="font-size:18px;font-weight:800;color:var(--accent);margin-bottom:16px">'+esc(pname)+'</p><p style="color:var(--muted);font-size:15px" class="pulse">Waiting for the host to start...</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px">'+chips+'</div></div>'}

function renderPlayerQ(g,me){currentScreen="player-q";clearInterval(timerIv);var q=QUESTIONS[g.currentQ];var btns="";for(var i=0;i<q.opts.length;i++){btns+='<button class="opt-btn" id="pbtn-'+i+'" style="background:'+CC[i]+'" onclick="playerAnswer('+g.currentQ+','+i+')"><span style="opacity:.7;margin-right:6px">'+ABCD[i]+'</span>'+esc(q.opts[i])+'</button>'}$("app").innerHTML='<div style="display:flex;justify-content:space-between;width:100%;max-width:640px;margin-bottom:6px"><span class="section-label">Q'+(g.currentQ+1)+'/'+QUESTIONS.length+'</span><span style="font-size:14px;color:var(--accent);font-weight:800">'+(me?me.score||0:0)+' PTS</span></div><div class="timer-bar"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;color:var(--muted)">Time remaining</span><span id="timer-num" style="font-size:16px;font-weight:800">--</span></div><div class="timer-track"><div id="timer-fill" class="timer-fill"></div></div></div>'+imgTag(q.img)+'<div class="opts-grid">'+btns+'</div><div id="hint-slot"></div>';startTimer(g.timerEnd,g.currentQ)}

function playerAnswer(qi,ci){playerAnsweredQ=qi;playerChoiceIdx=ci;for(var i=0;i<4;i++){var b=$("pbtn-"+i);if(b){if(i===ci){b.classList.add("selected")}else{b.classList.remove("selected")}}}db.ref("games/"+gameCode+"/answers/"+pid).set({choice:ci,time:Date.now()})}

function renderPlayerResults(g,players,me){currentScreen="player-results";clearInterval(timerIv);var q=QUESTIONS[g.currentQ];var correct=me?me.lastCorrect:false;var pts=me?me.lastPts||0:0;$("app").innerHTML='<div style="font-size:40px;margin:16px 0 8px">'+(correct?'\u{1F389}':'\u{1F62C}')+'</div><h2 style="font-size:22px;margin-bottom:4px;color:'+(correct?"#27ae60":"#cf5736")+'">'+(correct?'Correct! +'+pts:'Not Quite!')+'</h2><p style="color:var(--muted);font-size:14px;margin-bottom:8px">The answer was:</p><div style="background:rgba(39,174,96,.08);border:2px solid #27ae60;padding:10px 24px;border-radius:10px;font-size:16px;font-weight:700;margin-bottom:4px;color:#27ae60">'+esc(q.answer)+'</div>'+factHtml(q)+'<p style="font-size:15px;color:var(--accent);font-weight:800;margin:16px 0">Your total: '+(me?me.score||0:0)+'</p>'+renderLB(players,pid)}

function renderPlayerFinal(players,me){currentScreen="player-final";clearInterval(timerIv);var sorted=sortPlayers(players);var won=sorted[0]&&sorted[0].id===pid;$("app").innerHTML='<div style="font-size:56px;margin:20px 0 8px">\u{1F3C6}</div><h1 style="font-size:24px;color:var(--primary);margin-bottom:4px">Game Over!</h1>'+(won?'<p style="font-size:17px;color:var(--accent);font-weight:800;margin-bottom:4px">\u{1F389} You Won!</p>':'')+'<p style="color:var(--muted);font-size:15px;margin-bottom:20px">Your final score: <strong style="color:var(--accent)">'+(me?me.score||0:0)+'</strong></p>'+renderLB(players,pid)+'<div style="margin-top:20px"><button class="btn btn-ghost" style="max-width:200px" onclick="goHome()">BACK TO HOME</button></div>'}

function goHome(){detachAll();renderHome()}
renderHome();
</script>
</body>
</html>
